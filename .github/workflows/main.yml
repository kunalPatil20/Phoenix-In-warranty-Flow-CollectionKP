name : Postman Collection Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: 30 02 * * *
    - cron: 00 14 * * *

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Code
        uses: actions/checkout@v7.0.0

      - name: Install Node Js and npm
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install Newman and Html extra globally
        run: |
             npm install -g newman
             npm install -g newman-reporter-htmlextra

      - name: Run Postman Collection with Newman
        run: |
             newman run 'inwarranty- flow Collection Copy.postman_collection.json' \
             -e QA.postman_environment.json \
             -d 'Test Data.csv' \
             -r cli,htmlextra  \
             --reporter-htmlextra-export ./newman/index.html

      - name: Archive Report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Newman Report
          path: newman/*.html

      - name: Creating Git Hub Page Branch
        if:  always()
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN}}
          publish_dir: newman/

      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v18
        with:
            server_address: smtp.gmail.com
            server_port: 465
            username : ${{ secrets.EMAIL_USERNAME }}
            password : ${{ secrets.EMAIL_PASSWORD }}
            subject  : Phoenix Inwarranty Flow Test Execution Notification
            to : thekunalpatil20@gmail.com
            from : ${{ secrets.EMAIL_USERNAME }}
            body : |
                  Hi,
                  Phoenix Inwarranty Flow Test has been Executed 
                  The report has been published and URL is
                  https://kunalpatil20.github.io/Phoenix-In-warranty-Flow-CollectionKP/
                  
            
            
            
            
          
          
      
